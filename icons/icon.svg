<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2434"/>
      <stop offset="1" stop-color="#10141d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#dda23a" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#dda23a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0ca66"/>
      <stop offset="0.5" stop-color="#dda23a"/>
      <stop offset="1" stop-color="#b47d1e"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="210" fill="url(#glow)"/>

  <!-- Malha de planta (discreta) -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="2">
    <line x1="0" y1="150" x2="512" y2="150"/><line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="362" x2="512" y2="362"/>
    <line x1="150" y1="0" x2="150" y2="512"/><line x1="362" y1="0" x2="362" y2="512"/>
  </g>

  <!-- Régua dourada -->
  <rect x="118" y="150" width="46" height="252" rx="12" fill="url(#gold)"/>
  <g fill="#12141d" opacity="0.85">
    <rect x="144" y="186" width="20" height="7" rx="2"/>
    <rect x="151" y="222" width="13" height="7" rx="2"/>
    <rect x="144" y="258" width="20" height="7" rx="2"/>
    <rect x="151" y="294" width="13" height="7" rx="2"/>
    <rect x="144" y="330" width="20" height="7" rx="2"/>
    <rect x="151" y="366" width="13" height="7" rx="2"/>
  </g>

  <!-- Esquadro (set square) branco: triângulo retângulo em contorno -->
  <path fill="#f4f6fa" fill-rule="evenodd"
        d="M206 366 L400 366 L206 172 Z
           M240 320 L318 320 L240 242 Z"/>
</svg>
